<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw 一键安装</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; color: #333;
        }
        .container { max-width: 600px; margin: 0 auto; padding: 40px 20px; }
        .header { text-align: center; color: white; margin-bottom: 30px; }
        .header h1 { font-size: 2.2em; margin-bottom: 10px; }
        .header p { opacity: 0.9; }
        .card {
            background: white; border-radius: 16px; padding: 30px;
            margin-bottom: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        .card h2 { color: #667eea; margin-bottom: 20px; font-size: 1.3em; }
        .os-select { display: flex; gap: 10px; margin-bottom: 25px; }
        .os-btn {
            flex: 1; padding: 20px 10px; border: 2px solid #e0e0e0; border-radius: 12px;
            background: white; cursor: pointer; text-align: center; transition: all 0.2s;
        }
        .os-btn:hover { border-color: #667eea; }
        .os-btn.selected { border-color: #667eea; background: #f0f4ff; }
        .os-btn .icon { font-size: 36px; margin-bottom: 8px; }
        .os-btn .name { font-size: 14px; font-weight: 500; }
        .btn {
            display: block; width: 100%; padding: 16px; border: none; border-radius: 10px;
            font-size: 18px; font-weight: 600; cursor: pointer; transition: all 0.2s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2); color: white;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4); }
        .success-box {
            background: #e8f5e9; border: 2px solid #4caf50; border-radius: 10px;
            padding: 20px; margin-top: 20px;
        }
        .success-box h3 { color: #2e7d32; margin-bottom: 10px; }
        .step-indicator {
            display: flex; justify-content: center; gap: 10px; margin-bottom: 30px;
        }
        .step-dot {
            width: 12px; height: 12px; border-radius: 50%; background: rgba(255,255,255,0.3);
        }
        .step-dot.active { background: white; }
        .hidden { display: none; }
        .footer { text-align: center; color: white; opacity: 0.7; margin-top: 20px; font-size: 14px; }
        .note {
            background: #fff3cd; border-radius: 8px; padding: 15px; margin-top: 20px;
            font-size: 14px; color: #856404;
        }
        .note strong { display: block; margin-bottom: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🦞 OpenClaw 一键安装</h1>
            <p>选择操作系统，下载安装包，一键完成</p>
            <div class="step-indicator">
                <div class="step-dot active"></div>
                <div class="step-dot" id="dot2"></div>
            </div>
        </div>

        <!-- Step 1: 选择操作系统 -->
        <div class="card" id="step1">
            <h2>选择你的操作系统</h2>
            <div class="os-select">
                <div class="os-btn selected" data-os="macos" onclick="selectOS(this)">
                    <div class="icon">🍎</div>
                    <div class="name">macOS</div>
                </div>
                <div class="os-btn" data-os="windows" onclick="selectOS(this)">
                    <div class="icon">🪟</div>
                    <div class="name">Windows</div>
                </div>
                <div class="os-btn" data-os="linux" onclick="selectOS(this)">
                    <div class="icon">🐧</div>
                    <div class="name">Linux</div>
                </div>
            </div>
            <button class="btn btn-primary" onclick="downloadInstaller()">📥 下载安装包</button>
            
            <div class="note">
                <strong>📌 安装后运行以下命令配置 API Key：</strong>
                <code>openclaw configure</code>
            </div>
        </div>

        <!-- 安装说明 -->
        <div class="card hidden" id="step2">
            <h2>✅ 安装包已下载！</h2>
            <div id="installInstructions"></div>
            
            <div class="note" style="margin-top: 20px;">
                <strong>📌 安装完成后，运行以下命令配置：</strong>
                <ol style="margin: 10px 0 0 20px;">
                    <li><code>openclaw configure</code> - 配置 API Key</li>
                    <li><code>openclaw gateway start</code> - 启动服务</li>
                </ol>
            </div>
        </div>

        <div class="footer">
            <p>遇到问题？<a href="https://github.com/students209/openclaw-starter/issues" style="color: white;">提交 Issue</a> | 
            <a href="https://docs.openclaw.ai" style="color: white;">查看文档</a> | 
            <a href="https://discord.com/invite/clawd" style="color: white;">加入社区</a></p>
        </div>
    </div>

    <script>
        let config = { os: 'macos' };

        function selectOS(el) {
            document.querySelectorAll('.os-btn').forEach(b => b.classList.remove('selected'));
            el.classList.add('selected');
            config.os = el.dataset.os;
        }

        function downloadInstaller() {
            const script = generateScript();
            const blob = new Blob([script], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = config.os === 'windows' ? 'install-openclaw.bat' : 'install-openclaw.sh';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            // 显示安装说明
            document.getElementById('step1').classList.add('hidden');
            document.getElementById('step2').classList.remove('hidden');
            document.getElementById('dot2').classList.add('active');

            const instructions = config.os === 'macos' 
                ? `<p><strong>macOS 安装步骤：</strong></p>
                   <ol style="margin: 15px 0 0 20px; line-height: 2;">
                   <li>打开"终端"（按 Cmd+空格，输入 Terminal）</li>
                   <li>输入：<code style="background:#f0f0f0;padding:2px 6px;border-radius:4px;">cd ~/Downloads</code></li>
                   <li>输入：<code style="background:#f0f0f0;padding:2px 6px;border-radius:4px;">chmod +x install-openclaw.sh</code></li>
                   <li>输入：<code style="background:#f0f0f0;padding:2px 6px;border-radius:4px;">./install-openclaw.sh</code></li>
                   <li>等待安装完成</li>
                   </ol>`
                : config.os === 'windows'
                ? `<p><strong>Windows 安装步骤：</strong></p>
                   <ol style="margin: 15px 0 0 20px; line-height: 2;">
                   <li>双击下载的 <code style="background:#f0f0f0;padding:2px 6px;border-radius:4px;">install-openclaw.bat</code> 文件</li>
                   <li>如果提示安全警告，点击"仍要运行"</li>
                   <li>等待安装完成</li>
                   </ol>`
                : `<p><strong>Linux 安装步骤：</strong></p>
                   <ol style="margin: 15px 0 0 20px; line-height: 2;">
                   <li>打开终端</li>
                   <li>输入：<code style="background:#f0f0f0;padding:2px 6px;border-radius:4px;">chmod +x install-openclaw.sh</code></li>
                   <li>输入：<code style="background:#f0f0f0;padding:2px 6px;border-radius:4px;">./install-openclaw.sh</code></li>
                   <li>等待安装完成</li>
                   </ol>`;
            
            document.getElementById('installInstructions').innerHTML = instructions;
        }

        function generateScript() {
            if (config.os === 'windows') {
                return generateWindowsScript();
            } else {
                return generateUnixScript();
            }
        }

        function generateWindowsScript() {
            return `@echo off
chcp 65001 >nul 2>nul
cls
echo.
echo   ========================================
echo   ^|                                      ^|
echo   ^|       OpenClaw 一键安装              ^|
echo   ^|                                      ^|
echo   ========================================
echo.

:: 检查 Node.js
echo [1/3] 检查 Node.js...
where node >nul 2>nul
if %ERRORLEVEL% neq 0 (
    echo.
    echo [错误] 未检测到 Node.js
    echo.
    echo 请先安装 Node.js:
    echo   下载地址: https://nodejs.org/
    echo   建议下载 LTS 版本
    echo.
    pause
    exit /b 1
)
echo       已安装: 
node -v

:: 配置镜像并安装
echo.
echo [2/3] 安装 OpenClaw...
npm config set registry https://registry.npmmirror.com
call npm install -g openclaw

:: 验证安装
echo.
echo [3/3] 验证安装...
where openclaw >nul 2>nul
if %ERRORLEVEL% neq 0 (
    echo [警告] 安装可能未成功，请检查日志
    pause
    exit /b 1
)
echo       安装成功: 
openclaw --version 2>nul | findstr "OpenClaw"

echo.
echo   ========================================
echo   ^|                                      ^|
echo   ^|          安装完成!                   ^|
echo   ^|                                      ^|
echo   ========================================
echo.
echo 下一步:
echo   1. 运行: openclaw configure
echo      (交互式配置 API Key 和通道)
echo   2. 运行: openclaw gateway start
echo      (启动服务)
echo.
echo 文档: https://docs.openclaw.ai
echo 社区: https://discord.com/invite/clawd
echo.
pause
`;
        }

        function generateUnixScript() {
            return `#!/bin/bash
# OpenClaw 一键安装脚本

set -e

clear
echo ""
echo "  ========================================"
echo "  |                                      |"
echo "  |       OpenClaw 一键安装              |"
echo "  |                                      |"
echo "  ========================================"
echo ""

# 检查 Node.js
echo "[1/3] 检查 Node.js..."
if ! command -v node &> /dev/null; then
    echo ""
    echo "[错误] 未检测到 Node.js"
    echo ""
    echo "请先安装 Node.js:"
    echo "  macOS: brew install node"
    echo "  Ubuntu: curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash - && sudo apt install -y nodejs"
    echo "  或访问: https://nodejs.org/"
    echo ""
    exit 1
fi
echo "      已安装: $(node -v)"

# 配置镜像并安装
echo ""
echo "[2/3] 安装 OpenClaw..."
npm config set registry https://registry.npmmirror.com
npm install -g openclaw

# 验证安装
echo ""
echo "[3/3] 验证安装..."
if ! command -v openclaw &> /dev/null; then
    echo "[警告] 安装可能未成功，请检查日志"
    exit 1
fi
echo "      安装成功: $(openclaw --version 2>&1 | head -1)"

echo ""
echo "  ========================================"
echo "  |                                      |"
echo "  |          安装完成!                   |"
echo "  |                                      |"
echo "  ========================================"
echo ""
echo "下一步:"
echo "  1. 运行: openclaw configure"
echo "     (交互式配置 API Key 和通道)"
echo "  2. 运行: openclaw gateway start"
echo "     (启动服务)"
echo ""
echo "文档: https://docs.openclaw.ai"
echo "社区: https://discord.com/invite/clawd"
echo ""
`;
        }
    </script>
</body>
</html>
