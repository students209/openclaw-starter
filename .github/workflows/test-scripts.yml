name: Test Install Scripts

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Test macOS install script
        run: |
          # 创建测试脚本
          cat > test-install.sh << 'EOF'
          #!/bin/bash
          set -e
          
          echo "[1/3] 检查 Node.js..."
          if ! command -v node &> /dev/null; then
              echo "[错误] 未检测到 Node.js"
              exit 1
          fi
          echo "      已安装: $(node -v)"
          
          echo "[2/3] 安装 OpenClaw..."
          npm config set registry https://registry.npmmirror.com
          npm install -g openclaw
          
          echo "[3/3] 验证安装..."
          if ! command -v openclaw &> /dev/null; then
              echo "[警告] 安装未成功"
              exit 1
          fi
          echo "      安装成功"
          EOF
          
          chmod +x test-install.sh
          bash -n test-install.sh && echo "✓ 脚本语法正确"

  test-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Test Linux install script
        run: |
          # 测试脚本语法
          cat > test-install.sh << 'EOF'
          #!/bin/bash
          set -e
          
          echo "[1/3] 检查 Node.js..."
          if ! command -v node &> /dev/null; then
              echo "[错误] 未检测到 Node.js"
              exit 1
          fi
          echo "      已安装: $(node -v)"
          
          echo "[2/3] 安装 OpenClaw..."
          npm config set registry https://registry.npmmirror.com
          npm install -g openclaw
          
          echo "[3/3] 验证安装..."
          echo "      安装成功"
          EOF
          
          chmod +x test-install.sh
          bash -n test-install.sh && echo "✓ 脚本语法正确"
          
          # 测试Node.js检测
          echo "[测试] Node.js检测..."
          if command -v node &> /dev/null; then
              echo "✓ Node.js 已安装: $(node -v)"
          else
              echo "✗ Node.js 未找到"
              exit 1
          fi

  test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Test Windows install script
        shell: cmd
        run: |
          @echo off
          echo [1/3] 检查 Node.js...
          where node >nul 2>nul
          if %ERRORLEVEL% neq 0 (
              echo [ERROR] Node.js not found
              exit /b 1
          )
          echo       已安装:
          node -v
          
          echo [2/3] 安装 OpenClaw...
          npm config set registry https://registry.npmmirror.com
          call npm install -g openclaw
          
          echo [3/3] 验证安装...
          where openclaw >nul 2>nul
          if %ERRORLEVEL% neq 0 (
              echo [WARNING] 安装未成功
              exit /b 1
          )
          echo       安装成功:
          openclaw --version 2>nul | findstr "OpenClaw"
          
          echo.
          echo   Windows Script Test PASSED